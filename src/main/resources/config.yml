# ============================================================
#  Booster - Configuration
#   Version 1.0.0
# ============================================================

# Cle de licence (obtenez une cle gratuite sur discord.gg/qhu3n47vaA)
license-key: 'XXXXX-XXXXX-XXXXX-XXXXX'

# Parametres generaux
settings:
  # Cooldown par defaut en secondes (30 minutes = 1800)
  cooldown: 1800
  # Sauvegarder les cooldowns entre les redemarrages
  save-cooldowns: true
  # Afficher le temps restant en temps reel dans le lore
  dynamic-lore: true

  # Cooldowns reduits par permission (verifies du + prioritaire au moins prioritaire)
  # Le plugin prend le cooldown le plus bas pour lequel le joueur a la permission.
  cooldown-tiers:
    booster.elite:   300    # 5 minutes
    booster.premium: 600    # 10 minutes
    booster.vip:     900    # 15 minutes

# Configuration du GUI
gui:
  title: '🌊 Booster Menu'
  size: 36

# Commande principale
command: 'booster'

