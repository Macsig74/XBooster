  enabled: false
  # Pour placer un stand: /boostadmin placestand <boostId>  (debout a l'emplacement voulu)
  # Pour supprimer:       /boostadmin removestand <boostId>
  boosts: {}

# ============================================================
#  Reset du cooldown
# ============================================================
reset-cooldown:
  enabled: true
  slot: 31
  material: LIME_DYE
  display-name: '&#00FF00&lRESET COOLDOWN'
  # Cout en shards DonutShards (verif + retrait automatique via ShardsAPI)
  cost: 500
  # Texte affiche dans le lore a la place de {cost}
  cost-display: '&#FF258F500x'
  lore:
    - '&8Description'
    - ''
    - '&#00C1FFInformation:'
    - '&fClick here, to buy'
    - '&fa &#00FF00reset &ffor your cooldown.'
    - ''
    - '&#FF258F☆ &fShards: {cost}'
    - ''
    - '&#FBE401▶ &#FBE401&l&nCLICK&#FBE401 to Activate'

